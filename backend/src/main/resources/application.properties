# MongoDB Local Configuration (default for development)
# Atlas can still be used by setting MONGODB_URI or enabling the atlas profile.
spring.mongodb.uri=${MONGODB_URI:mongodb+srv://edusense42_db_user:edusense2003%23@cluster0.wnctjbm.mongodb.net/edusense?retryWrites=true&w=majority}
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://edusense42_db_user:edusense2003%23@cluster0.wnctjbm.mongodb.net/edusense?retryWrites=true&w=majority}

spring.data.mongodb.auto-index-creation=true
server.port=${SERVER_PORT:8082}

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.mongodb.client=INFO

# Auth and JWT
app.jwt.secret=${APP_JWT_SECRET:ReplaceThisJwtSecretWith32CharsMinReplaceNow}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
app.oauth.google.client-id=${GOOGLE_CLIENT_ID:}

# Optional bootstrap account for first SUPER_ADMIN
app.bootstrap.super-admin.email=${APP_BOOTSTRAP_SUPER_ADMIN_EMAIL:}
app.bootstrap.super-admin.password=${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:}
app.bootstrap.super-admin.name=${APP_BOOTSTRAP_SUPER_ADMIN_NAME:System Super Admin}

# Firebase Configuration
firebase.credentials.path=${FIREBASE_SERVICE_ACCOUNT_PATH:}

# File Upload Settings (Module C - Tickets)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
app.upload.dir=./uploads/tickets
spring.web.resources.static-locations=classpath:/static/
